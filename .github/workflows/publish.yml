name: Publish to PyPi

on:
  release:
    types: [published]

jobs:
  # Umbrella PyTCP dist. Decoupled from the net_addr release: it
  # publishes ONLY on a full release tag (vX.Y.Z), never on a
  # net_addr-* tag. The umbrella wheel is known-broken pre-existing
  # (see docs/refactor/umbrella_wheel_packaging.md); this job is
  # left exactly as it was so the net_addr release cannot drag a
  # broken PyTCP upload along with it.
  deploy:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    # Trusted Publishing (OIDC) — no API token. Requires a
    # matching PyPI "trusted publisher" registered for this repo
    # + workflow, and id-token: write so GitHub can mint the OIDC
    # token pypi.org verifies.
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build package
        run: python -m build

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1

  # Standalone PyTCP-net_addr dist (single repo, multi-dist),
  # decoupled from the umbrella: it publishes ONLY on a
  # 'net_addr-vX.Y.Z' release tag. Independent job + its own PyPI
  # trusted-publisher entry pointing at this workflow. Dormant
  # until such a Release is published.
  deploy-net_addr:
    if: startsWith(github.event.release.tag_name, 'net_addr-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build package
        run: python -m build packages/net_addr

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/net_addr/dist

  # Standalone PyTCP-net_proto dist, decoupled from the umbrella
  # and from net_addr: it publishes ONLY on a 'net_proto-vX.Y.Z'
  # release tag. Independent job + its own PyPI trusted-publisher
  # entry pointing at this workflow. Dormant until such a Release
  # is published.
  deploy-net_proto:
    if: startsWith(github.event.release.tag_name, 'net_proto-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build package
        run: python -m build packages/net_proto

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/net_proto/dist
