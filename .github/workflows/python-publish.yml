# Builds and uploads the three monorepo packages to PyPI when a release is created.
# Uses PyPI Trusted Publishing (OIDC) — no API token — same as pymobiledevice3.
# Each project (pmd-pytcp, pmd-net-addr, pmd-net-proto) must have a trusted publisher
# configured on PyPI pointing at this repo + workflow.

name: Upload Python Packages

on:
  release:
    types: [ created ]

jobs:
  deploy:
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Build distributions
        run: |
          uv build packages/pmd_net_addr -o dist
          uv build packages/pmd_net_proto -o dist
          uv build packages/pmd_pytcp -o dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          verbose: true
          # The three packages version independently; a release that only bumps
          # one (e.g. pmd-pytcp) still rebuilds all three, so skip the siblings
          # already present on the index instead of failing the upload.
          skip-existing: true
