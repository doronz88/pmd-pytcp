[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "PyTCP-net_addr"
description = "An alternative to Python's standard-library ipaddress module — originally built for the PyTCP stack, fully usable on its own."
readme = "README.md"
authors = [{ name = "Sebastian Majewski", email = "ccie18643@gmail.com" }]
license = "GPL-3.0-or-later"
license-files = ["LICENSE"]
classifiers = [
    "Programming Language :: Python :: 3.14",
    "Development Status :: 3 - Alpha",
    "Operating System :: POSIX :: Linux",
    "Natural Language :: English",
    "Topic :: System :: Networking",
    "Typing :: Typed",
]
keywords = [
    "pytcp",
    "networking",
    "ipaddress",
    "ipv4",
    "ipv6",
    "mac",
    "cidr",
    "netmask",
    "wildcard",
]
dependencies = []
requires-python = ">=3.14"
dynamic = ["version"]

[project.optional-dependencies]
cli = ["click>=8"]

[project.urls]
"Homepage" = "https://github.com/ccie18643/PyTCP"
"Bug Tracker" = "https://github.com/ccie18643/PyTCP/issues"

[tool.setuptools.dynamic]
version = { attr = "net_addr.__version__" }

[tool.setuptools.packages.find]
include = ["net_addr*"]
exclude = ["net_addr.tests*"]

[tool.setuptools.package-data]
net_addr = ["py.typed"]
