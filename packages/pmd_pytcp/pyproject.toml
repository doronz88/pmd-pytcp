[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "pmd-pytcp"
description = "Pure-Python, zero-dependency TCP/IP stack — Ethernet through RFC 9293 TCP — running in user space on a TAP/TUN interface, embeddable in-process or run as a daemon, with a Berkeley-sockets API."
readme = "README.md"
authors = [{ name = "Sebastian Majewski", email = "ccie18643@gmail.com" }]
license = "GPL-3.0-or-later"
license-files = ["LICENSE"]
classifiers = [
    "Programming Language :: Python :: 3.14",
    "Development Status :: 3 - Alpha",
    "Operating System :: POSIX :: Linux",
    "Natural Language :: English",
    "Environment :: Console",
    "Topic :: System :: Networking",
    "Typing :: Typed",
]
keywords = [
    "pmd_pytcp",
    "stack",
    "networking",
    "tcp",
    "ip",
    "ipv4",
    "ipv6",
    "arp",
    "ethernet",
    "icmp",
]
dependencies = ["pmd-net-addr==0.0.2", "pmd-net-proto==0.0.2", "typing_extensions>=4.6"]
requires-python = ">=3.9"
dynamic = ["version"]

[project.scripts]
pytcpd = "pmd_pytcp.daemon.__main__:main"

[project.urls]
"Homepage" = "https://github.com/ccie18643/PyTCP"
"Bug Tracker" = "https://github.com/ccie18643/PyTCP/issues"

[tool.setuptools.dynamic]
version = { attr = "pmd_pytcp.__version__" }

[tool.setuptools.packages.find]
# The trailing '*' is load-bearing: an exact "pmd_pytcp" pattern ships
# ONLY the top-level package (the historical umbrella-wheel bug,
# pre-existing on PyPI 3.0.4). The glob pulls in the
# pmd_pytcp.protocols.* / pmd_pytcp.runtime.* subpackages. Pinned by
# packages/pmd_net_proto/pmd_net_proto/tests/unit/test__packaging__dist_wheels.py.
include = ["pmd_pytcp*"]
exclude = ["pmd_pytcp.tests*"]

[tool.setuptools.package-data]
pmd_pytcp = ["py.typed"]
