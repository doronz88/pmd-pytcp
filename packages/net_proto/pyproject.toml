[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "PyTCP-net_proto"
description = "The network-protocol packet parse/assemble layer of the PyTCP stack — Ethernet through TCP/UDP — fully usable on its own."
readme = "README.md"
authors = [{ name = "Sebastian Majewski", email = "ccie18643@gmail.com" }]
license = "GPL-3.0-or-later"
license-files = ["LICENSE"]
classifiers = [
    "Programming Language :: Python :: 3.14",
    "Development Status :: 3 - Alpha",
    "Operating System :: POSIX :: Linux",
    "Natural Language :: English",
    "Topic :: System :: Networking",
    "Typing :: Typed",
]
keywords = [
    "pytcp",
    "networking",
    "tcp",
    "ip",
    "ipv4",
    "ipv6",
    "arp",
    "ethernet",
    "icmp",
    "udp",
]
dependencies = ["PyTCP-net_addr==3.0.6"]
requires-python = ">=3.14"
dynamic = ["version"]

[project.urls]
"Homepage" = "https://github.com/ccie18643/PyTCP"
"Bug Tracker" = "https://github.com/ccie18643/PyTCP/issues"

[tool.setuptools.dynamic]
version = { attr = "net_proto.__version__" }

[tool.setuptools.packages.find]
# The trailing '*' is load-bearing: an exact "net_proto" pattern
# ships ONLY the top-level package (1 file) — the exact defect
# that breaks the umbrella PyTCP wheel. pyproject find already
# enables namespace discovery, so this glob alone pulls in the
# net_proto.protocols.* PEP 420 namespace subpackages. Pinned by
# test__packaging__dist_wheels.py — do not narrow to "net_proto".
include = ["net_proto*"]
exclude = ["net_proto.tests*"]

[tool.setuptools.package-data]
net_proto = ["py.typed"]
